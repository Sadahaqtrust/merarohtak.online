<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Digital Rohtak 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #111;
    }

    h1 {
      text-align: center;
      padding: 1.5rem;
      margin: 0;
      background: linear-gradient(90deg, #d35400, #6ab04c);
      color: #fff;
    }

    .categories {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .category {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .category img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #ddd;
    }

    .category-title {
      padding: 0.75rem;
      text-align: center;
      font-weight: bold;
    }

    .subcategories {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #fafafa;
      border-top: 1px solid #eee;
    }

    .category.open .subcategories {
      max-height: 400px;
    }

    .subcategories ul {
      list-style: none;
      margin: 0;
      padding: 0.5rem 1rem 1rem;
    }

    .subcategories li {
      padding: 0.4rem 0;
      border-bottom: 1px dashed #ccc;
      font-size: 0.9rem;
    }

    .subcategories li:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>

<h1>Digital Rohtak 2026 – Categories</h1>

<div class="categories" id="categories"></div>

<script>
  const DATA = [
    {
      name: "Pharmacy",
      image: "https://picsum.photos/400/300?random=1",
      subs: ["Medicines", "Medical Devices", "Supplements", "Ayurveda"]
    },
    {
      name: "Education",
      image: "https://picsum.photos/400/300?random=2",
      subs: ["Schools", "Coaching", "Online Courses", "Skill Training"]
    },
    {
      name: "Legal Services",
      image: "https://picsum.photos/400/300?random=3",
      subs: ["Civil Law", "Criminal Law", "Property Law", "Documentation"]
    },
    {
      name: "Groceries",
      image: "https://picsum.photos/400/300?random=4",
      subs: ["Staples", "Dairy", "Snacks", "Household Items"]
    },
    {
      name: "Fruits & Vegetables",
      image: "https://picsum.photos/400/300?random=5",
      subs: ["Fresh Fruits", "Leafy Veg", "Organic Produce"]
    }
  ];

  const container = document.getElementById("categories");

  DATA.forEach(cat => {
    const div = document.createElement("div");
    div.className = "category";

    div.innerHTML = `
      <img src="${cat.image}" alt="${cat.name}">
      <div class="category-title">${cat.name}</div>
      <div class="subcategories">
        <ul>
          ${cat.subs.map(s => `<li>${s}</li>`).join("")}
        </ul>
      </div>
    `;

    div.onclick = () => div.classList.toggle("open");
    container.appendChild(div);
  });
</script>

</body>
</html>
